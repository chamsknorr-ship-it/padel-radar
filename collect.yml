name: Collect

on:
  schedule:
    - cron: "*/15 * * * *"   # alle 15 Minuten
  workflow_dispatch: {}        # erlaubt manuelles Starten per Knopfdruck

permissions:
  contents: write              # nötig, damit der Lauf Daten zurück ins Repo schreiben darf

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pakete installieren
        run: pip install -r requirements.txt

      - name: Daten sammeln
        env:
          PADEL_LAT: "52.5200"
          PADEL_LNG: "13.4050"
          PADEL_RADIUS_M: "30000"
          PADEL_DAYS: "14"
          # Optional: feste Club-IDs, falls die Umkreissuche nichts findet:
          # PADEL_TENANT_IDS: "id1,id2,id3"
        run: python collector.py

      - name: Ergebnisse speichern (commit)
        run: |
          git config user.name  "padel-radar-bot"
          git config user.email "actions@github.com"
          git add -A data docs/data
          if git diff --cached --quiet; then
            echo "Keine Änderungen."
          else
            git commit -m "Datenaktualisierung [skip ci]"
            git push
          fi
